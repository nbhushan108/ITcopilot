name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  SQLALCHEMY_SILENCE_UBER_WARNING: "1"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check apps packages scripts tests apps/api/alembic

      - name: Run Ruff formatter check
        run: ruff format --check apps packages scripts tests apps/api/alembic

      - name: Run MyPy
        run: mypy apps/api/app packages

      - name: Run Bandit security scan
        run: bandit -r apps/api/app packages -c pyproject.toml

      - name: Audit Python dependencies
        run: pip-audit --desc

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: pytest --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=95
        env:
          ENVIRONMENT: testing
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          AUTH_ENABLED: "false"
          AUTO_CREATE_SCHEMA: "true"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint frontend
        working-directory: apps/web
        run: npm run lint

      - name: Type check frontend
        working-directory: apps/web
        run: npm run typecheck

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          tags: itcopilot-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
