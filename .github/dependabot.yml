version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python-production:
        patterns:
          - "fastapi*"
          - "pydantic*"
          - "sqlalchemy*"
          - "alembic*"
      python-dev:
        dependency-type: development
        patterns:
          - "pytest*"
          - "ruff*"
          - "mypy*"

  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
