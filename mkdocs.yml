site_name: ITcopilot Documentation
site_description: Production-grade AI-powered Income Tax Copilot for India
site_url: https://nbhushan108.github.io/ITcopilot
repo_url: https://github.com/nbhushan108/ITcopilot
repo_name: nbhushan108/ITcopilot

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Configuration Guide: configuration-guide.md
  - Developer Guide: developer-guide.md
  - API Reference: api-reference.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md
  - Security: security.md
  - GitHub Setup: github-setup.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
